name: Golden Image - Trigger Build

# Fires a new EC2 Image Builder pipeline execution whenever a build
# component changes (windows-updates, cis-hardening, agent-install,
# validation-test) or on manual dispatch / schedule. Polls the build
# until it reaches a terminal state so failures are visible right here
# in the Actions run, not just in CloudWatch/SNS.

on:
  push:
    branches: [main]
    paths:
      - "golden-image-windows/components/**"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you triggering this build manually?"
        required: false
        default: "manual trigger"
  schedule:
    # Safety-net weekly check — the pipeline's own EventBridge schedule
    # (see schedule_cron in variables.tf) handles the primary monthly
    # patch-Tuesday-aligned rebuild. This is a secondary trigger only if
    # you want CI to also kick a build right after a component merge,
    # which the push trigger above already covers — keep or remove.
    - cron: "0 20 * * 1" # Mondays 20:00 UTC, adjust/remove as needed

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-2
  TF_WORKING_DIR: golden-image-windows
  # How long to poll before giving up and failing the job (minutes)
  MAX_WAIT_MINUTES: 90

jobs:
  trigger-build:
    name: Trigger Image Builder Pipeline
    runs-on: ubuntu-latest
    environment: golden-image-shared-services
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Look up pipeline ARN
        id: lookup
        run: |
          PIPELINE_ARN=$(aws imagebuilder list-image-pipelines \
            --filters name=name,values="golden-win2022-pipeline" \
            --query "imagePipelineList[0].arn" --output text)

          if [ -z "$PIPELINE_ARN" ] || [ "$PIPELINE_ARN" == "None" ]; then
            echo "::error::Could not find pipeline. Has the Terraform infra been applied yet?"
            exit 1
          fi

          echo "pipeline_arn=$PIPELINE_ARN" >> "$GITHUB_OUTPUT"
          echo "Found pipeline: $PIPELINE_ARN"

      - name: Start image pipeline execution
        id: start
        run: |
          IMAGE_BUILD_ARN=$(aws imagebuilder start-image-pipeline-execution \
            --image-pipeline-arn "${{ steps.lookup.outputs.pipeline_arn }}" \
            --query "imageBuildVersionArn" --output text)

          echo "image_build_arn=$IMAGE_BUILD_ARN" >> "$GITHUB_OUTPUT"
          echo "Started build: $IMAGE_BUILD_ARN"
          echo "### 🏗️ Build started" >> "$GITHUB_STEP_SUMMARY"
          echo "\`$IMAGE_BUILD_ARN\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Poll for build completion
        id: poll
        run: |
          IMAGE_BUILD_ARN="${{ steps.start.outputs.image_build_arn }}"
          MAX_ATTEMPTS=$(( ${{ env.MAX_WAIT_MINUTES }} / 2 ))
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            STATUS=$(aws imagebuilder get-image \
              --image-build-version-arn "$IMAGE_BUILD_ARN" \
              --query "image.state.status" --output text)

            echo "[$(date -u +%H:%M:%S)] Status: $STATUS (attempt $((ATTEMPT+1))/$MAX_ATTEMPTS)"

            case "$STATUS" in
              AVAILABLE)
                echo "result=success" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
              FAILED|CANCELLED|DEPRECATED)
                echo "result=failed" >> "$GITHUB_OUTPUT"
                echo "final_status=$STATUS" >> "$GITHUB_OUTPUT"
                exit 1
                ;;
              *)
                # PENDING, BUILDING, TESTING, DISTRIBUTING, etc. — keep waiting
                sleep 120
                ATTEMPT=$((ATTEMPT+1))
                ;;
            esac
          done

          echo "::error::Timed out after ${{ env.MAX_WAIT_MINUTES }} minutes waiting for build."
          echo "result=timeout" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Fetch failure reason
        if: failure() && steps.start.outputs.image_build_arn != ''
        run: |
          aws imagebuilder get-image \
            --image-build-version-arn "${{ steps.start.outputs.image_build_arn }}" \
            --query "image.state.reason" --output text || true

      - name: Get resulting AMI ID
        if: success()
        id: result
        run: |
          AMI_ID=$(aws imagebuilder get-image \
            --image-build-version-arn "${{ steps.start.outputs.image_build_arn }}" \
            --query "image.outputResources.amis[0].image" --output text)

          echo "ami_id=$AMI_ID" >> "$GITHUB_OUTPUT"
          echo "### ✅ Build succeeded" >> "$GITHUB_STEP_SUMMARY"
          echo "New AMI: \`$AMI_ID\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "SSM parameter is updated automatically via the EventBridge + Lambda flow." >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize failure
        if: failure()
        run: |
          echo "### ❌ Build did not complete successfully" >> "$GITHUB_STEP_SUMMARY"
          echo "Check the Image Builder console or S3 logs bucket for full build/test logs." >> "$GITHUB_STEP_SUMMARY"
