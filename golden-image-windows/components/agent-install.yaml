name: AgentInstall
description: Confirms SSM Agent is current and installs/configures the CloudWatch Agent for centralized logging and metrics.
schemaVersion: 1.0

phases:
  - name: build
    steps:
      - name: UpdateSSMAgent
        action: ExecutePowerShell
        inputs:
          commands:
            - |
              Write-Host "Updating SSM Agent to latest..."
              $progressPreference = 'SilentlyContinue'
              Invoke-WebRequest "https://s3.amazonaws.com/ec2-downloads-windows/SSMAgent/latest/windows_amd64/AmazonSSMAgentSetup.exe" -OutFile "$env:TEMP\SSMAgentSetup.exe"
              Start-Process -FilePath "$env:TEMP\SSMAgentSetup.exe" -ArgumentList "/S" -Wait
              Write-Host "SSM Agent updated."

      - name: InstallCloudWatchAgent
        action: ExecutePowerShell
        inputs:
          commands:
            - |
              Write-Host "Installing CloudWatch Agent..."
              $progressPreference = 'SilentlyContinue'
              Invoke-WebRequest "https://s3.amazonaws.com/amazoncloudwatch-agent/windows/amd64/latest/amazon-cloudwatch-agent.msi" -OutFile "$env:TEMP\amazon-cloudwatch-agent.msi"
              Start-Process msiexec.exe -ArgumentList "/i `"$env:TEMP\amazon-cloudwatch-agent.msi`" /qn" -Wait
              Write-Host "CloudWatch Agent installed."

              # NOTE: Agent config (which logs/metrics to ship) is intentionally
              # NOT baked in here — push it via SSM Parameter Store + the
              # amazon-cloudwatch-agent-ctl config-from-ssm flow at instance
              # launch time instead. Keeps the golden image environment-agnostic.

      - name: PlaceholderForEDRAgent
        action: ExecutePowerShell
        inputs:
          commands:
            - |
              Write-Host "Placeholder: insert your org's EDR/AV agent install here (e.g. CrowdStrike, Defender for Endpoint onboarding)."
              Write-Host "Pull the installer/token from S3 or Secrets Manager at build time — never hardcode credentials in this component."

  - name: validate
    steps:
      - name: ConfirmAgentsRunning
        action: ExecutePowerShell
        inputs:
          commands:
            - |
              $ssm = Get-Service -Name AmazonSSMAgent -ErrorAction SilentlyContinue
              $cw = Get-Service -Name AmazonCloudWatchAgent -ErrorAction SilentlyContinue

              if (-not $ssm) {
                Write-Host "FAIL: AmazonSSMAgent service not found."
                exit 1
              }
              if (-not $cw) {
                Write-Host "FAIL: AmazonCloudWatchAgent service not found."
                exit 1
              }

              Write-Host "PASS: Required agent services present."
