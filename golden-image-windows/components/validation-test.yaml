name: ValidationTest
description: Runs a Pester test suite against the built image to confirm hardening, agents, and baseline expectations before the AMI is marked AVAILABLE.
schemaVersion: 1.0

phases:
  # Runs in the test phase on a freshly-launched test instance built from the AMI.
  - name: test
    steps:
      - name: InstallPester
        action: ExecutePowerShell
        inputs:
          commands:
            - |
              $ErrorActionPreference = 'Stop'

              # Use the Pester that ships with Windows (PS5+) if it's 5.0+;
              # otherwise install from PSGallery.
              $existing = Get-Module -ListAvailable -Name Pester | Sort-Object Version -Descending | Select-Object -First 1
              if ($existing -and $existing.Version -ge [version]'5.0.0') {
                Write-Host "Using existing Pester $($existing.Version)."
                Import-Module Pester -Force
                exit 0
              }

              Write-Host "Installing Pester 5.0+ from PSGallery..."
              Set-PSRepository -Name PSGallery -InstallationPolicy Trusted -ErrorAction SilentlyContinue
              Install-Module -Name Pester -Force -SkipPublisherCheck -MinimumVersion 5.0.0 -Scope AllUsers -Confirm:$false -AllowClobber
              Import-Module Pester -Force
              Write-Host "Pester installed and imported."

      - name: WritePesterTests
        action: ExecutePowerShell
        inputs:
          commands:
            - |
              $ErrorActionPreference = 'Stop'

              $testContent = @'
              Describe "Golden Image Validation" {

                  Context "Required Services" {
                      BeforeAll {
                          $ssm = Get-Service -Name AmazonSSMAgent -ErrorAction SilentlyContinue
                          $cw  = Get-Service -Name AmazonCloudWatchAgent -ErrorAction SilentlyContinue
                      }
                      It "SSM Agent service exists" {
                          $ssm | Should -Not -BeNullOrEmpty
                      }
                      It "CloudWatch Agent service exists" {
                          $cw | Should -Not -BeNullOrEmpty
                      }
                  }

                  Context "Hardening Baseline" {
                      It "Guest account is disabled" {
                          (Get-LocalUser -Name "Guest" -ErrorAction Stop).Enabled | Should -Be $false
                      }
                      It "SMBv1 is disabled" {
                          $smb1 = Get-WindowsOptionalFeature -Online -FeatureName SMB1Protocol -ErrorAction SilentlyContinue
                          if ($null -eq $smb1) {
                              Set-ItResult -Skipped -Because "SMB1Protocol feature not present on this image (source files unavailable)"
                          } else {
                              $smb1.State | Should -Be "Disabled"
                          }
                      }
                      It "Windows Firewall is enabled on all profiles" {
                          $profiles = Get-NetFirewallProfile -ErrorAction Stop
                          $profiles | ForEach-Object { $_.Enabled | Should -Be $true }
                      }
                      It "WDigest credential caching is disabled" {
                          $val = Get-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\WDigest" -Name "UseLogonCredential" -ErrorAction SilentlyContinue
                          if ($null -eq $val) {
                              Set-ItResult -Skipped -Because "WDigest registry value not present (expected on default install)"
                          } else {
                              $val.UseLogonCredential | Should -Be 0
                          }
                      }
                  }

                  Context "Image Health" {
                      It "Boot drive has at least 5 GB free" {
                          $drive = (Get-PSDrive -PSProvider FileSystem | Where-Object { $_.Used -ne $null } | Select-Object -First 1)
                          $freeGB = [math]::Round($drive.Free / 1GB, 2)
                          Write-Host "Free space on $($drive.Root): $freeGB GB"
                          $freeGB | Should -BeGreaterThan 5
                      }
                  }
              }
              '@
              Set-Content -Path "C:\golden-image-tests.ps1" -Value $testContent -Encoding UTF8
              Write-Host "Pester test file written to C:\golden-image-tests.ps1"

      - name: RunPesterTests
        action: ExecutePowerShell
        inputs:
          commands:
            - |
              $ErrorActionPreference = 'Continue'

              $config = New-PesterConfiguration
              $config.Run.Path = "C:\golden-image-tests.ps1"
              $config.Output.Verbosity = "Detailed"
              $config.Run.PassThru = $true

              $result = Invoke-Pester -Configuration $config

              Write-Host ""
              Write-Host "================ Pester Summary ================"
              Write-Host "Passed : $($result.PassedCount)"
              Write-Host "Failed : $($result.FailedCount)"
              Write-Host "Skipped: $($result.SkippedCount)"
              Write-Host "Total  : $($result.TotalCount)"
              Write-Host "================================================"

              if ($result.FailedCount -gt 0) {
                  Write-Host "VALIDATION FAILED — blocking image promotion."
                  foreach ($t in $result.Failed) {
                      Write-Host "  FAILED: $($t.ExpandedPath) — $($t.ErrorRecord.Exception.Message)"
                  }
                  exit 1
              }

              Write-Host "All validation tests passed."
