name: WindowsUpdates
description: Installs all available Windows Updates at build time so the AMI is never built from a stale patch baseline.
schemaVersion: 1.0

phases:
  - name: build
    steps:
      - name: InstallWindowsUpdates
        action: ExecutePowerShell
        inputs:
          commands:
            - |
              $ErrorActionPreference = 'Continue'

              Write-Host "Installing PSWindowsUpdate module..."
              try {
                # NuGet provider is required to download from PSGallery
                if (-not (Get-PackageProvider -Name NuGet -ErrorAction SilentlyContinue)) {
                  Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force | Out-Null
                }
                Set-PSRepository -Name PSGallery -InstallationPolicy Trusted -ErrorAction SilentlyContinue
                if (-not (Get-Module -ListAvailable -Name PSWindowsUpdate)) {
                  Install-Module -Name PSWindowsUpdate -Force -SkipPublisherCheck -Confirm:$false
                }
                Import-Module PSWindowsUpdate -Force
              } catch {
                Write-Host "WARNING: Failed to bootstrap PSWindowsUpdate module: $_"
                Write-Host "Skipping Windows Update install. The AMI will use the patch level of the base image."
                Write-Host "This is non-fatal — the build will continue and the next scheduled run will retry."
                exit 0
              }

              Write-Host "Scanning for available updates..."
              try {
                $updates = Get-WindowsUpdate -ErrorAction Stop
              } catch {
                Write-Host "WARNING: Get-WindowsUpdate failed: $_"
                Write-Host "Skipping update install — proceeding with current patch level."
                exit 0
              }

              if ($null -eq $updates -or $updates.Count -eq 0) {
                Write-Host "No updates pending. Patch baseline is current."
                exit 0
              }

              Write-Host "Found $($updates.Count) update(s). Installing without auto-reboot..."
              Write-Host "(Reboot will be handled explicitly by the RebootAfterUpdates step below.)"

              # Use -AutoReboot:$false so the cmdlet never invokes a reboot itself.
              # If a reboot IS required, we exit 3010 explicitly — AWSTOE has special
              # handling for that code in the build phase.
              try {
                $result = Install-WindowsUpdate -AcceptAll -AutoReboot:$false -Confirm:$false -ErrorAction Stop
                Write-Host "Install-WindowsUpdate completed."

                # Check whether any installed update requires a reboot
                $needsReboot = $false
                if ($null -ne $result) {
                  foreach ($u in $result) {
                    if ($u.RebootRequired) { $needsReboot = $true; break }
                  }
                }

                if ($needsReboot) {
                  Write-Host "One or more installed updates require a reboot. Signaling 3010 for AWSTOE."
                  exit 3010
                }

                Write-Host "All updates installed. No reboot required."
                exit 0
              } catch {
                # Don't fail the build on a partial install — log and continue.
                # Missing updates will be picked up on the next scheduled cycle.
                Write-Host "WARNING: Install-WindowsUpdate encountered errors: $_"
                Write-Host "Continuing build — remaining updates will be applied on next cycle."
                exit 0
              }

      - name: RebootAfterUpdates
        action: Reboot
        inputs:
          delaySeconds: 30

  - name: validate
    steps:
      - name: ConfirmNoPendingUpdates
        action: ExecutePowerShell
        inputs:
          commands:
            - |
              $ErrorActionPreference = 'Continue'

              try {
                Import-Module PSWindowsUpdate -Force -ErrorAction Stop
                $pending = Get-WindowsUpdate -ErrorAction Stop
              } catch {
                # Windows Update service can be in 'starting' state right after a reboot.
                # Treat that as "could not verify" rather than failing the build.
                Write-Host "WARNING: Could not query Windows Update state post-reboot: $_"
                Write-Host "Validate phase is informational — build is not blocked on this."
                exit 0
              }

              if ($pending -and $pending.Count -gt 0) {
                Write-Host "INFO: $($pending.Count) update(s) still listed as pending after install/reboot."
                Write-Host "This is often transient (WU service still scanning). Not blocking the build."
                exit 0
              }

              Write-Host "Patch baseline confirmed current — no pending updates."
              exit 0
