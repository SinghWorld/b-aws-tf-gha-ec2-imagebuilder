name: CISHardening
description: Applies a CIS Benchmark-aligned hardening baseline for Windows Server. Extend this with your org's specific STIG/CIS control set.
schemaVersion: 1.0

phases:
  - name: build
    steps:
      - name: ApplyCISBaseline
        action: ExecutePowerShell
        inputs:
          commands:
            - |
              $ErrorActionPreference = 'Continue'
              $WarningPreference     = 'SilentlyContinue'

              Write-Host "Applying CIS hardening baseline..."

              # --- Account/Password policy (CIS 1.x) ---
              # 'net accounts' is deprecated but still functional on WS2022 for these knobs.
              # Wrap each in try/catch so a single failure doesn't abort the whole baseline.
              try { net accounts /minpwlen:14         | Out-Null } catch { Write-Host "WARN: net accounts /minpwlen failed: $_" }
              try { net accounts /maxpwage:60         | Out-Null } catch { Write-Host "WARN: net accounts /maxpwage failed: $_" }
              try { net accounts /lockoutthreshold:5  | Out-Null } catch { Write-Host "WARN: net accounts /lockoutthreshold failed: $_" }
              try { net accounts /lockoutduration:15  | Out-Null } catch { Write-Host "WARN: net accounts /lockoutduration failed: $_" }
              try { net accounts /lockoutwindow:15    | Out-Null } catch { Write-Host "WARN: net accounts /lockoutwindow failed: $_" }

              # --- Disable SMBv1 (CIS 18.3.x) ---
              # The -Online source files must be present on the base image. On minimal
              # AMIs this can throw "source files could not be found" -- that's a
              # warning here, not a failure. The validate phase below checks the
              # final state instead of relying on this single call.
              try {
                $smb1 = Get-WindowsOptionalFeature -Online -FeatureName SMB1Protocol -ErrorAction Stop
                if ($smb1.State -ne 'Disabled') {
                  Disable-WindowsOptionalFeature -Online -FeatureName SMB1Protocol -NoRestart -ErrorAction Stop | Out-Null
                  Write-Host "SMBv1 disabled."
                } else {
                  Write-Host "SMBv1 already disabled."
                }
              } catch {
                Write-Host "WARN: Could not disable SMB1Protocol feature (source files may be missing): $_"
                Write-Host "      The validate phase will confirm the final state."
              }

              # --- Disable Guest account (CIS 2.3.1.x) ---
              try {
                Set-LocalUser -Name "Guest" -Enabled $false -ErrorAction Stop
                Write-Host "Guest account disabled."
              } catch {
                try { net user Guest /active:no | Out-Null } catch { Write-Host "WARN: Could not disable Guest account: $_" }
              }

              # --- Enable Windows Firewall on all profiles (CIS 9.x) ---
              try {
                Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled True -ErrorAction Stop
                Write-Host "Windows Firewall enabled on all profiles."
              } catch {
                Write-Host "WARN: Set-NetFirewallProfile failed: $_"
              }

              # --- Disable LLMNR (CIS 18.x -- common lateral movement vector) ---
              try {
                $llmnrPath = "HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\DNSClient"
                if (-not (Test-Path $llmnrPath)) {
                  New-Item -Path $llmnrPath -Force | Out-Null
                }
                Set-ItemProperty -Path $llmnrPath -Name "EnableMulticast" -Value 0 -Type DWord -Force
                Write-Host "LLMNR disabled."
              } catch {
                Write-Host "WARN: Could not disable LLMNR: $_"
              }

              # --- Disable WDigest credential caching (CIS 18.x) ---
              try {
                $wdPath = "HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\WDigest"
                if (-not (Test-Path $wdPath)) {
                  New-Item -Path $wdPath -Force | Out-Null
                }
                Set-ItemProperty -Path $wdPath -Name "UseLogonCredential" -Value 0 -Type DWord -Force
                Write-Host "WDigest credential caching disabled."
              } catch {
                Write-Host "WARN: Could not set WDigest UseLogonCredential: $_"
              }

              # --- Enable audit logging for logon events (CIS 17.x) ---
              try {
                auditpol /set /category:"Logon/Logoff"     /success:enable /failure:enable | Out-Null
                auditpol /set /category:"Account Management" /success:enable /failure:enable | Out-Null
                Write-Host "Audit policies enabled."
              } catch {
                Write-Host "WARN: auditpol failed: $_"
              }

              Write-Host "CIS baseline application complete."

              # NOTE: For full enterprise compliance, replace/extend this block with:
              #   - Microsoft's official CIS Benchmark GPO baseline (via LGPO.exe import), or
              #   - DSC configuration referencing your org's compliance-as-code repo
              # This inline block covers the highest-impact controls only.

  - name: validate
    steps:
      - name: VerifyCISBaseline
        action: ExecutePowerShell
        inputs:
          commands:
            - |
              $ErrorActionPreference = 'Continue'
              $failed = $false

              # Guest disabled
              try {
                $guest = Get-LocalUser -Name "Guest" -ErrorAction Stop
                if ($guest.Enabled) {
                  Write-Host "FAIL: Guest account is still enabled."
                  $failed = $true
                } else {
                  Write-Host "PASS: Guest account is disabled."
                }
              } catch {
                Write-Host "WARN: Could not check Guest account: $_"
              }

              # SMBv1 disabled (informational -- source files may not exist on minimal base)
              try {
                $smb1 = Get-WindowsOptionalFeature -Online -FeatureName SMB1Protocol -ErrorAction Stop
                if ($smb1.State -eq 'Disabled') {
                  Write-Host "PASS: SMBv1 is disabled."
                } else {
                  Write-Host "WARN: SMBv1 state is '$($smb1.State)' -- could not confirm disabled."
                  # Don't fail on this one -- source files may not be available
                }
              } catch {
                Write-Host "WARN: Could not query SMBv1 state: $_"
              }

              # Firewall enabled
              try {
                $profiles = Get-NetFirewallProfile -ErrorAction Stop
                foreach ($p in $profiles) {
                  if (-not $p.Enabled) {
                    Write-Host "FAIL: Firewall profile '$($p.Name)' is disabled."
                    $failed = $true
                  }
                }
                if (-not $failed) { Write-Host "PASS: All firewall profiles enabled." }
              } catch {
                Write-Host "WARN: Could not query firewall profiles: $_"
              }

              # WDigest
              try {
                $val = Get-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\SecurityProviders\WDigest" -Name "UseLogonCredential" -ErrorAction Stop
                if ($val.UseLogonCredential -ne 0) {
                  Write-Host "FAIL: WDigest UseLogonCredential is $($val.UseLogonCredential), expected 0."
                  $failed = $true
                } else {
                  Write-Host "PASS: WDigest UseLogonCredential is 0."
                }
              } catch {
                Write-Host "WARN: Could not query WDigest registry value: $_"
              }

              if ($failed) {
                Write-Host "CIS validation FAILED -- blocking image promotion."
                exit 1
              }

              Write-Host "CIS baseline validation passed."
